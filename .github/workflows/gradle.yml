name: Build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read
  packages: read

env:
  GITHUB_TOKEN: ${{ github.token }}

jobs:
  jars:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm-community'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & test
        run: |
          chmod +x ./gradlew
          ./gradlew jvmTest
          ./gradlew cli:shadowJar
          ./gradlew gui:shadowJar

      - name: Upload CLI JAR
        uses: actions/upload-artifact@v4
        with:
          name: mct-cli
          path: cli/build/libs/cli-*-all.jar

      - name: Upload GUI JAR
        uses: actions/upload-artifact@v4
        with:
          name: mct-gui-shadow
          path: gui/build/libs/gui-*-all.jar

  native:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linuxX64
          - os: windows-latest
            target: mingwX64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm-community'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: gradle

      - name: Cache Kotlin Native compiler + deps (~/.konan)
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-2.4.0
          restore-keys: |
            ${{ runner.os }}-konan-

      - name: Link native binary
        run: |
          chmod +x ./gradlew
          ./gradlew cli:linkReleaseExecutable${{ matrix.target }}

      - name: Package GUI for Linux
        if: matrix.os == 'ubuntu-latest'
        run: |
          ./gradlew gui:packageReleaseAppImage
          ./gradlew gui:packageReleaseDeb

      - name: Upload CLI native
        uses: actions/upload-artifact@v4
        with:
          name: mct-cli-${{ matrix.target }}
          path: cli/build/bin/${{ matrix.target }}/releaseExecutable/mct*

      - name: Upload GUI for Linux
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: mct-gui-${{ matrix.target }}-deb
          path: gui/build/compose/binaries/main-release/deb/*.deb

      - name: Package GUI for Windows
        if: matrix.os == 'windows-latest'
        run: |
          ./gradlew gui:packageReleaseAppImage
          ./gradlew gui:packageReleaseMsi

      - name: Upload GUI for Windows
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: mct-gui-${{ matrix.target }}-msi
          path: gui/build/compose/binaries/main-release/msi/*.msi

      - name: Upload GUI AppImage
        uses: actions/upload-artifact@v4
        with:
          name: mct-gui-${{ matrix.target }}
          path: gui/build/compose/binaries/main-release/app/**/*

  graalvm-native:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linuxX64
          - os: windows-latest
            target: mingwX64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm-community'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-job: true
          cache: gradle

      - name: Setup Visual Studio (Windows)
        if: matrix.os == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build GraalVM native image
        shell: bash
        run: |
          chmod +x ./gradlew
          ./gradlew :cli-graal:nativeCompile

      - name: Upload GraalVM native image
        uses: actions/upload-artifact@v4
        with:
          name: mct-cli-graal-${{ matrix.target }}
          path: cli-graal/build/native/nativeCompile/*
