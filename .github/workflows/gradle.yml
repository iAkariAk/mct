name: Build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  jars:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Build & test
      run: |
        chmod +x ./gradlew
        ./gradlew jvmTest
        ./gradlew cli:shadowJar
        ./gradlew gui:shadowJar
        ./gradlew gui:proguardReleaseJars

    - name: Upload CLI JAR
      uses: actions/upload-artifact@v4
      with:
        name: mct-cli
        path: cli/build/libs/cli-*-all.jar

    - name: Upload GUI shadow JAR
      uses: actions/upload-artifact@v4
      with:
        name: mct-gui-shadow
        path: gui/build/libs/gui-*-all.jar

    - name: Upload GUI ProGuard JAR
      uses: actions/upload-artifact@v4
      with:
        name: mct-gui
        path: gui/build/compose/tmp/*/proguard/gui-jvm-*.jar

  native:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linuxX64
          - os: windows-latest
            target: mingwX64
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Link native binary
      run: |
        chmod +x ./gradlew
        ./gradlew cli:linkReleaseExecutable${{ matrix.target }}

    - name: Package AppImage
      if: matrix.os == 'ubuntu-latest'
      run: ./gradlew gui:packageReleaseAppImage

    - name: Upload CLI native
      uses: actions/upload-artifact@v4
      with:
        name: mct-cli-${{ matrix.target }}
        path: cli/build/bin/${{ matrix.target }}/releaseExecutable/mct*

    - name: Upload AppImage
      if: matrix.os == 'ubuntu-latest'
      uses: actions/upload-artifact@v4
      with:
        name: mct-gui-${{ matrix.target }}
        path: gui/build/compose/binaries/main-release/app/**/*
