okio = { module = "com.squareup.okio:okio", version.ref = "okio" }
okio-fakefilesystem = { module = "com.squareup.okio:okio-fakefilesystem", version.ref = "okio" }
openai-client = { module = "com.aallam.openai:openai-client", version.ref = "openai-client" }
proguard = { module = "com.guardsquare:proguard-gradle", version.ref = "proguard" }
slf4j-nop = { module = "org.slf4j:slf4j-nop", version.ref = "slf4j" }

[bundles]
arrow = [
    "arrow-core",
    "arrow-functions",
    "arrow-fx-coroutines",
]
kotest = [
    "kotest-asserter-arrow",
    "kotest-asserter-core",
    "kotest-framework-engine",
    "kotest-property",
]
ktoml = [
    "ktoml-core",
    "ktoml-file",
]
okio = [
    "okio",
    "okio-fakefilesystem",
]

[plugins]
catelog-update = { id = "nl.littlerobots.version-catalog-update", version.ref = "catelog-update" }
compose-compiler = { id = "org.jetbrains.kotlin.plugin.compose", version.ref = "kotlin" }
compose-multiplatform = { id = "org.jetbrains.compose", version.ref = "compose" }
goncalossilva-resources = { id = "com.goncalossilva.resources", version.ref = "resources" }
graalvm-native = { id = "org.graalvm.buildtools.native", version.ref = "graalvm-native" }
kotest = { id = "io.kotest", version.ref = "kotest" }
kotlin-multiplatform = { id = "org.jetbrains.kotlin.multiplatform", version.ref = "kotlin" }
kotlin-serialization = { id = "org.jetbrains.kotlin.plugin.serialization", version.ref = "kotlin" }
ksp = { id = "com.google.devtools.ksp", version.ref = "ksp" }
shadow = { id = "com.gradleup.shadow", version.ref = "shadow" }
