goncalossilva-resources = { module = "com.goncalossilva:resources", version.ref = "resources" }
jetbrains-annotations = { module = "org.jetbrains:annotations", version.ref = "jetbrains-annotations" }
jtokkit = { module = "com.knuddels:jtokkit", version.ref = "jtokkit" }
kmpalette-core = { module = "com.materialkolor.palette:core", version.ref = "kmpalette" }
kmpalette-extensions-file = { module = "com.materialkolor.palette:extensions-file", version.ref = "kmpalette" }
kmpzip-core = { module = "no.synth:kmp-zip", version.ref = "kmp-zip" }
kmpzip-okio = { module = "no.synth:kmp-zip-okio", version.ref = "kmp-zip" }
knbt = { module = "net.benwoodworth.knbt:knbt", version.ref = "knbt" }
koin-compose = { module = "io.insert-koin:koin-compose", version.ref = "koin" }
